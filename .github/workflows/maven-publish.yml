name: ChestCommandsPro

on:
  workflow_dispatch 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Download Dependencies
      run: |
        mkdir -p lib
        wget -O lib/PlayerPoints-2.2.4.jar https://example.com/files/PlayerPoints-2.2.4.jar
        wget -O lib/ChestCommands-3.3.0.jar https://example.com/files/ChestCommands-3.3.0.jar

    - name: Build with Maven
      run: mvn clean install -DskipTests
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: target-jar
          path: target/*.jar
